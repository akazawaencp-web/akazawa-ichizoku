<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家系図背景 — 11枚重ね合わせドリフト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#2a2218;color:#1a1a1a;overflow-x:hidden}

/* ===== 背景: 11枚を大きめにランダム配置+各自ドリフト ===== */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-img{position:absolute;background-size:cover;background-position:center;opacity:.32;filter:brightness(.5) saturate(.5) blur(0px);-webkit-mask-image:radial-gradient(ellipse at center,black 30%,transparent 70%);mask-image:radial-gradient(ellipse at center,black 30%,transparent 70%)}

/* 各画像の位置・サイズ・アニメーション — 大きめに重ねて配置 */
.bg-img:nth-child(1){top:-10%;left:-5%;width:60%;height:55%;background-image:url('bg-images/01_kawanakajima.jpg');animation:mv1 20s ease-in-out infinite alternate}
.bg-img:nth-child(2){top:-5%;right:-10%;width:55%;height:50%;background-image:url('bg-images/02_rakuchu_rakugai.jpg');animation:mv2 24s ease-in-out infinite alternate}
.bg-img:nth-child(3){top:20%;left:15%;width:50%;height:45%;background-image:url('bg-images/03_fujin_raijin.jpg');animation:mv3 18s ease-in-out infinite alternate}
.bg-img:nth-child(4){top:10%;right:5%;width:55%;height:50%;background-image:url('bg-images/04_sekigahara.jpg');animation:mv4 22s ease-in-out infinite alternate}
.bg-img:nth-child(5){top:35%;left:-8%;width:50%;height:45%;background-image:url('bg-images/05_mongol_invasion.jpg');animation:mv5 19s ease-in-out infinite alternate}
.bg-img:nth-child(6){top:40%;left:30%;width:45%;height:40%;background-image:url('bg-images/06_genji_emaki.jpg');animation:mv6 23s ease-in-out infinite alternate}
.bg-img:nth-child(7){top:50%;right:-5%;width:55%;height:45%;background-image:url('bg-images/07_ishiyamadera.jpg');animation:mv7 17s ease-in-out infinite alternate}
.bg-img:nth-child(8){top:60%;left:5%;width:50%;height:45%;background-image:url('bg-images/08_genji_yadorigi.jpg');animation:mv8 21s ease-in-out infinite alternate}
.bg-img:nth-child(9){display:none}
.bg-img:nth-child(10){bottom:-5%;left:10%;width:55%;height:50%;background-image:url('bg-images/10_kasuga_gongen.jpg');animation:mv10 25s ease-in-out infinite alternate}
.bg-img:nth-child(11){display:none}

@keyframes mv1{from{transform:translate(0,0) scale(1)}to{transform:translate(5%,4%) scale(1.1)}}
@keyframes mv2{from{transform:translate(0,0) scale(1.05)}to{transform:translate(-5%,3%) scale(1)}}
@keyframes mv3{from{transform:translate(-3%,0) scale(1)}to{transform:translate(4%,5%) scale(1.08)}}
@keyframes mv4{from{transform:translate(3%,-2%) scale(1.04)}to{transform:translate(-4%,3%) scale(1)}}
@keyframes mv5{from{transform:translate(0,2%) scale(1)}to{transform:translate(5%,-3%) scale(1.07)}}
@keyframes mv6{from{transform:translate(-2%,-2%) scale(1.03)}to{transform:translate(3%,4%) scale(1)}}
@keyframes mv7{from{transform:translate(2%,0) scale(1)}to{transform:translate(-5%,2%) scale(1.08)}}
@keyframes mv8{from{transform:translate(-3%,2%) scale(1.04)}to{transform:translate(2%,-4%) scale(1)}}
@keyframes mv9{from{transform:translate(0,-2%) scale(1)}to{transform:translate(-4%,3%) scale(1.06)}}
@keyframes mv10{from{transform:translate(2%,2%) scale(1.03)}to{transform:translate(-3%,-2%) scale(1)}}

/* オーバーレイ */
.ov{position:fixed;inset:0}
.ov-white{background:rgba(244,244,242,.54);z-index:1}
.ov-grain{opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px;pointer-events:none;z-index:2}

/* 調整バー */
.adjust-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.08);padding:10px 20px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.adjust-bar label{font-size:11px;color:#666;display:flex;align-items:center;gap:6px}
.adjust-bar input[type=range]{width:120px}
.adjust-bar .val{font-family:monospace;font-size:11px;color:#999;min-width:40px}

/* ツリー本体 */
.tree-wrap{position:relative;z-index:3;padding:80px 20px 60px;display:flex;flex-direction:column;align-items:center}
.tree-title{text-align:center;font-family:'Shippori Mincho',serif;font-size:2rem;font-weight:700;letter-spacing:.15em;margin-bottom:8px;color:#1a1a1a}
.tree-subtitle{text-align:center;font-size:.85rem;color:#888;margin-bottom:40px}
.tree{display:flex;flex-direction:column;align-items:center;min-width:600px;padding:10px}
.person{display:flex;flex-direction:column;align-items:center;position:relative}
.nd{background:rgba(255,255,255,.92);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:14px 22px;text-align:center;min-width:120px;transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative;z-index:2;backdrop-filter:blur(4px)}
.nd:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.12)}
.nd-name{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:500;line-height:1.4}
.nd-name.imp{color:#8b6914;font-size:16px;font-weight:600}
.nd-name.dir{color:#1a1a1a;font-weight:600}
.nd-name.nor{color:#555}
.nd-role{font-size:11px;color:#999;margin-top:3px}
.v-down{width:2px;height:35px;margin:0 auto;background:linear-gradient(180deg,#a0a5b0,#c8cdd8)}
.children-group{display:flex;flex-direction:column;align-items:center;position:relative}
.h-bar{height:2px;position:absolute;top:0;z-index:1;background:linear-gradient(90deg,#a0a5b0,#c8cdd8)}
.kids{display:flex;justify-content:center;align-items:flex-start;gap:20px}
.v-up{width:2px;height:35px;margin:0 auto;background:linear-gradient(180deg,#a0a5b0,#c8cdd8)}
.legend{display:flex;gap:24px;flex-wrap:wrap;margin-top:30px;padding-top:20px;border-top:1px solid rgba(0,0,0,.08)}
.legend-item{display:flex;align-items:center;gap:8px;font-size:11px;color:#888}
.legend-line{width:30px;height:2px}
.legend-txt{font-family:'Shippori Mincho',serif;font-size:12px}
.legend-txt.g{color:#8b6914;font-weight:600}
.legend-txt.d{color:#1a1a1a;font-weight:600}
</style>
</head>
<body>

<!-- 背景: 11枚を大きめにランダム重ね -->
<div class="bg-canvas">
  <div class="bg-img"></div>
  <div class="bg-img"></div>
  <div class="bg-img"></div>
  <div class="bg-img"></div>
  <div class="bg-img"></div>
  <div class="bg-img"></div>
  <div class="bg-img"></div>
  <div class="bg-img"></div>
  <div class="bg-img"></div>
  <div class="bg-img"></div>
  <div class="bg-img"></div>
</div>
<div class="ov ov-white" id="ovWhite"></div>
<div class="ov ov-grain"></div>

<!-- 調整バー -->
<div class="adjust-bar">
  <label>overlay: <input type="range" min="0" max="100" value="60" id="ovSlider"><span class="val" id="ovVal">60%</span></label>
  <label>blur: <input type="range" min="0" max="20" value="2" id="blurSlider"><span class="val" id="blurVal">2px</span></label>
  <label>画像透明度: <input type="range" min="10" max="80" value="35" id="opSlider"><span class="val" id="opVal">35%</span></label>
</div>

<!-- ツリー -->
<div class="tree-wrap">
  <div class="tree-title">赤澤一族 家系図</div>
  <div class="tree-subtitle">背景に11枚の歴史絵画が重なりながら動いています</div>
  <div class="tree">
    <div class="person">
      <div class="nd"><div class="nd-name imp">小笠原長清</div><div class="nd-role">信濃守護</div></div>
      <div class="v-down"></div>
      <div class="children-group">
        <div class="h-bar"></div>
        <div class="kids">
          <div class="person">
            <div class="v-up"></div>
            <div class="nd"><div class="nd-name dir">小笠原長経</div><div class="nd-role">長男・嫡流</div></div>
            <div class="v-down"></div>
            <div class="children-group">
              <div class="h-bar"></div>
              <div class="kids">
                <div class="person"><div class="v-up"></div><div class="nd"><div class="nd-name nor">小笠原長政</div><div class="nd-role">長男・本家</div></div></div>
                <div class="person">
                  <div class="v-up"></div>
                  <div class="nd"><div class="nd-name imp">赤沢清経</div><div class="nd-role">次男・赤沢氏の祖</div></div>
                  <div class="v-down"></div>
                  <div class="children-group">
                    <div class="h-bar"></div>
                    <div class="kids">
                      <div class="person"><div class="v-up"></div><div class="nd"><div class="nd-name dir">赤沢常興</div><div class="nd-role">塩崎城主</div></div></div>
                      <div class="person"><div class="v-up"></div><div class="nd"><div class="nd-name nor">赤沢経康</div><div class="nd-role"></div></div></div>
                    </div>
                  </div>
                </div>
                <div class="person"><div class="v-up"></div><div class="nd"><div class="nd-name nor">伴野長房</div><div class="nd-role">三男</div></div></div>
              </div>
            </div>
          </div>
          <div class="person">
            <div class="v-up"></div>
            <div class="nd"><div class="nd-name nor">小笠原長忠</div><div class="nd-role">次男</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-line" style="background:linear-gradient(90deg,#a0a5b0,#c8cdd8)"></div>接続線（銀グラデ）</div>
    <div class="legend-item"><span class="legend-txt g">金色テキスト</span> = 重要人物</div>
    <div class="legend-item"><span class="legend-txt d">太字テキスト</span> = 直系</div>
  </div>
</div>

<script>
// 横線計算
function fixBars(){
  document.querySelectorAll('.children-group').forEach(cg=>{
    const kids=cg.querySelector('.kids');
    const hbar=cg.querySelector('.h-bar');
    if(!kids||!hbar)return;
    const persons=kids.children;
    if(persons.length<2){hbar.style.display='none';return}
    const first=persons[0],last=persons[persons.length-1];
    const kR=kids.getBoundingClientRect();
    const fC=first.getBoundingClientRect().left+first.getBoundingClientRect().width/2-kR.left;
    const lC=last.getBoundingClientRect().left+last.getBoundingClientRect().width/2-kR.left;
    hbar.style.left=fC+'px';hbar.style.width=(lC-fC)+'px';
  });
}
window.addEventListener('load',fixBars);
window.addEventListener('resize',fixBars);

// スライダー
const bgImgs = document.querySelectorAll('.bg-img');

document.getElementById('ovSlider').addEventListener('input', function(){
  document.getElementById('ovWhite').style.background = 'rgba(244,244,242,' + (this.value/100) + ')';
  document.getElementById('ovVal').textContent = this.value + '%';
});

document.getElementById('blurSlider').addEventListener('input', function(){
  const b = this.value;
  const br = 0.5;
  bgImgs.forEach(img => { img.style.filter = 'brightness('+br+') saturate(.5) blur('+b+'px)'; });
  document.getElementById('blurVal').textContent = b + 'px';
});

document.getElementById('opSlider').addEventListener('input', function(){
  const v = this.value / 100;
  bgImgs.forEach(img => { img.style.opacity = v; });
  document.getElementById('opVal').textContent = this.value + '%';
});
</script>

</body>
</html>
