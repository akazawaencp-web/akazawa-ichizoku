<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v6.8 — Silver Bright 確定版（背景ダイナミック）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Shippori+Mincho:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#0a0a0a;color:#fff;overflow-x:hidden}

/* ===== 背景: Soft多重透過（より大きな動き、より速い） ===== */
.layers{position:absolute;inset:0;z-index:1}
.ly{position:absolute;inset:-12%;background-size:cover;background-position:center;filter:brightness(.45) saturate(.5)}

/* 各レイヤーのスタート位置をずらして、最初から動いて見えるようにする */
.l1{background-image:url('../jpeg/IMG_9925.jpg');opacity:.5;animation:bgA 14s ease-in-out infinite alternate}
.l2{background-image:url('../jpeg/IMG_9935.jpg');opacity:.35;mix-blend-mode:soft-light;animation:bgB 16s ease-in-out infinite alternate}
.l3{background-image:url('../jpeg/IMG_9927.jpg');opacity:.3;mix-blend-mode:soft-light;animation:bgC 12s ease-in-out infinite alternate}
.l4{background-image:url('../jpeg/IMG_9940.jpg');opacity:.25;mix-blend-mode:soft-light;animation:bgD 15s ease-in-out infinite alternate}

/* 動きを大きく（3-4%の移動 + 10-15%のスケール変化） */
@keyframes bgA{
  0%{transform:scale(1.02) translate(1.5%,-1%)}
  100%{transform:scale(1.12) translate(-2%,1.5%)}
}
@keyframes bgB{
  0%{transform:scale(1.1) translate(-1.5%,1%)}
  100%{transform:scale(1.02) translate(2%,-1.5%)}
}
@keyframes bgC{
  0%{transform:scale(1.05) translate(2%,1.5%)}
  100%{transform:scale(1.14) translate(-1.5%,-1%)}
}
@keyframes bgD{
  0%{transform:scale(1.08) translate(-1%,-1.5%)}
  100%{transform:scale(1.15) translate(1.5%,2%)}
}

.ov{position:absolute;inset:0}
.ov-m{background:radial-gradient(ellipse at 50% 45%,rgba(10,10,10,.35) 0%,rgba(10,10,10,.6) 100%);z-index:2}
.ov-g{opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px;pointer-events:none;z-index:3}

/* ===== 中央コンテンツ ===== */
.cc{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:60px 24px}

/* 家紋: 最初から浮遊 + なぞり + グロー */
.km-float{animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.glow-wrap{animation:glowS 4s ease-in-out infinite 3s}
@keyframes glowS{0%,100%{filter:drop-shadow(0 0 12px rgba(200,205,215,.06))}50%{filter:drop-shadow(0 0 30px rgba(200,205,215,.18))}}

.p-km{width:280px;height:280px;margin-bottom:44px}
.p-km svg{stroke-dasharray:1400;stroke-dashoffset:1400;animation:draw 2.5s cubic-bezier(.4,0,.2,1) .3s forwards}
@keyframes draw{0%{stroke-dashoffset:1400}100%{stroke-dashoffset:0}}

/* テキスト */
.p-en{font-size:9px;letter-spacing:.5em;color:rgba(200,205,215,.25);margin-bottom:20px;animation:fi 2s ease .1s both}
@keyframes fi{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}

.p-t{font-family:'Shippori Mincho',serif;font-size:68px;font-weight:400;letter-spacing:.4em;color:rgba(235,238,245,.85);text-shadow:0 0 60px rgba(200,205,215,.1);animation:fi 2.5s ease 2s both;opacity:0}

.p-gline{width:80px;height:2px;background:linear-gradient(90deg,transparent,rgba(180,185,200,.35),rgba(220,225,240,.6),rgba(180,185,200,.35),transparent);margin:22px auto;animation:fi 2s ease 2.8s both}

.p-sub{font-size:10px;letter-spacing:.2em;color:rgba(200,205,215,.3);animation:fi 2s ease 3.2s both;line-height:2}

.scue{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.18);letter-spacing:.06em;animation:bn 2.5s infinite;z-index:10}
@keyframes bn{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}

@media(max-width:768px){
  .p-t{font-size:44px !important;letter-spacing:.25em !important}
  .p-km{width:200px;height:200px}
}
</style>
</head>
<body>

<div class="layers">
  <div class="ly l1"></div>
  <div class="ly l2"></div>
  <div class="ly l3"></div>
  <div class="ly l4"></div>
</div>
<div class="ov ov-m"></div>
<div class="ov ov-g"></div>

<div class="cc">
  <div class="p-en">AKAZAWA ICHIZOKU</div>
  <div class="km-float">
    <div class="glow-wrap">
      <div class="p-km">
        <svg viewBox="0 0 200 200" fill="none" stroke="rgba(200,205,215,.5)" stroke-width="1.5">
          <circle cx="100" cy="100" r="90"/>
          <g transform="translate(100,100)">
            <polygon points="0,-55 25,-40 0,-25 -25,-40"/>
            <polygon points="0,-30 45,0 0,30 -45,0" stroke-width="2"/>
            <polygon points="0,25 25,40 0,55 -25,40"/>
          </g>
          <line x1="100" y1="88" x2="100" y2="112" stroke-width="1.2"/>
          <line x1="88" y1="100" x2="112" y2="100" stroke-width="1.2"/>
        </svg>
      </div>
    </div>
  </div>
  <div class="p-t">赤澤一族</div>
  <div class="p-gline"></div>
  <div class="p-sub">Since 850 — Reiwa Edition<br>千年の血脈を、いま紐解く</div>
</div>

<div class="scue">↓ scroll</div>

</body>
</html>
