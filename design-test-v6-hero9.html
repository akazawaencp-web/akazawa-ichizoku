<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v6.9 — 家紋サイズ比較（200/240/280px）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Shippori+Mincho:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#0a0a0a;color:#fff;overflow-x:hidden}

.sel{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(10,10,10,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06);padding:10px 16px;display:flex;gap:6px;align-items:center}
.sel-l{font-size:10px;color:rgba(255,255,255,.3);margin-right:6px}
.sb{padding:7px 18px;border:1px solid rgba(255,255,255,.1);border-radius:6px;background:transparent;cursor:pointer;font-family:inherit;font-size:11px;color:rgba(255,255,255,.45);transition:all .12s}
.sb:hover{border-color:rgba(255,255,255,.25);color:#fff}
.sb.on{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)}

.hero{display:none;min-height:100vh;position:relative;overflow:hidden}
.hero.on{display:block}

/* BG */
.layers{position:absolute;inset:0;z-index:1}
.ly{position:absolute;inset:-12%;background-size:cover;background-position:center;filter:brightness(.45) saturate(.5)}
.l1{background-image:url('../jpeg/IMG_9925.jpg');opacity:.5;animation:bgA 14s ease-in-out infinite alternate}
.l2{background-image:url('../jpeg/IMG_9935.jpg');opacity:.35;mix-blend-mode:soft-light;animation:bgB 16s ease-in-out infinite alternate}
.l3{background-image:url('../jpeg/IMG_9927.jpg');opacity:.3;mix-blend-mode:soft-light;animation:bgC 12s ease-in-out infinite alternate}
.l4{background-image:url('../jpeg/IMG_9940.jpg');opacity:.25;mix-blend-mode:soft-light;animation:bgD 15s ease-in-out infinite alternate}
@keyframes bgA{0%{transform:scale(1.02) translate(1.5%,-1%)}100%{transform:scale(1.12) translate(-2%,1.5%)}}
@keyframes bgB{0%{transform:scale(1.1) translate(-1.5%,1%)}100%{transform:scale(1.02) translate(2%,-1.5%)}}
@keyframes bgC{0%{transform:scale(1.05) translate(2%,1.5%)}100%{transform:scale(1.14) translate(-1.5%,-1%)}}
@keyframes bgD{0%{transform:scale(1.08) translate(-1%,-1.5%)}100%{transform:scale(1.15) translate(1.5%,2%)}}
.ov{position:absolute;inset:0}
.ov-m{background:radial-gradient(ellipse at 50% 45%,rgba(10,10,10,.35) 0%,rgba(10,10,10,.6) 100%);z-index:2}
.ov-g{opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px;pointer-events:none;z-index:3}

.cc{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:60px 24px}

.km-float{animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.glow-wrap{animation:glowS 4s ease-in-out infinite 3s}
@keyframes glowS{0%,100%{filter:drop-shadow(0 0 12px rgba(200,205,215,.06))}50%{filter:drop-shadow(0 0 30px rgba(200,205,215,.18))}}
.p-km svg{stroke-dasharray:1400;stroke-dashoffset:1400;animation:draw 2.5s cubic-bezier(.4,0,.2,1) .3s forwards}
@keyframes draw{0%{stroke-dashoffset:1400}100%{stroke-dashoffset:0}}

.p-en{font-size:9px;letter-spacing:.5em;color:rgba(200,205,215,.25);margin-bottom:20px;animation:fi 2s ease .1s both}
@keyframes fi{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
.p-t{font-family:'Shippori Mincho',serif;font-size:52px;font-weight:600;letter-spacing:.3em;color:rgba(235,238,245,.92);text-shadow:0 0 50px rgba(200,205,215,.12);animation:fi 2s ease 2s both;opacity:0}
.p-gline{width:80px;height:2px;background:linear-gradient(90deg,transparent,rgba(180,185,200,.35),rgba(220,225,240,.6),rgba(180,185,200,.35),transparent);margin:22px auto;animation:fi 2s ease 2.8s both}
.p-sub{font-size:10px;letter-spacing:.2em;color:rgba(200,205,215,.3);animation:fi 2s ease 3.2s both}
.scue{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.18);letter-spacing:.06em;animation:bn 2.5s infinite;z-index:10}
@keyframes bn{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}

/* サイズバリエーション */
.sz-200 .p-km{width:200px;height:200px;margin-bottom:36px}
.sz-240 .p-km{width:240px;height:240px;margin-bottom:40px}
.sz-280 .p-km{width:280px;height:280px;margin-bottom:44px}

/* サイズラベル */
.sz-label{position:absolute;top:60px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.3);z-index:10;background:rgba(0,0,0,.4);padding:5px 14px;border-radius:5px;backdrop-filter:blur(8px)}

@media(max-width:768px){
  .p-t{font-size:36px !important;letter-spacing:.2em !important}
  .sz-200 .p-km{width:150px;height:150px}
  .sz-240 .p-km{width:180px;height:180px}
  .sz-280 .p-km{width:210px;height:210px}
}
</style>
</head>
<body>

<div class="sel">
  <span class="sel-l">家紋サイズ:</span>
  <button class="sb on" onclick="sw(1,this)">200px（現在）</button>
  <button class="sb" onclick="sw(2,this)">240px</button>
  <button class="sb" onclick="sw(3,this)">280px</button>
</div>

<!-- 200px -->
<div class="hero on sz-200" id="h1">
  <div class="layers"><div class="ly l1"></div><div class="ly l2"></div><div class="ly l3"></div><div class="ly l4"></div></div>
  <div class="ov ov-m"></div><div class="ov ov-g"></div>
  <div class="sz-label">200px</div>
  <div class="cc">
    <div class="p-en">AKAZAWA ICHIZOKU</div>
    <div class="km-float"><div class="glow-wrap"><div class="p-km"><svg viewBox="0 0 200 200" fill="none" stroke="rgba(200,205,215,.5)" stroke-width="1.5"><circle cx="100" cy="100" r="90"/><g transform="translate(100,100)"><polygon points="0,-55 25,-40 0,-25 -25,-40"/><polygon points="0,-30 45,0 0,30 -45,0" stroke-width="2"/><polygon points="0,25 25,40 0,55 -25,40"/></g><line x1="100" y1="88" x2="100" y2="112" stroke-width="1.2"/><line x1="88" y1="100" x2="112" y2="100" stroke-width="1.2"/></svg></div></div></div>
    <div class="p-t">赤澤一族</div><div class="p-gline"></div><div class="p-sub">清和源氏 — 令和版</div>
  </div>
  <div class="scue">↓</div>
</div>

<!-- 240px -->
<div class="hero sz-240" id="h2">
  <div class="layers"><div class="ly l1"></div><div class="ly l2"></div><div class="ly l3"></div><div class="ly l4"></div></div>
  <div class="ov ov-m"></div><div class="ov ov-g"></div>
  <div class="sz-label">240px</div>
  <div class="cc">
    <div class="p-en">AKAZAWA ICHIZOKU</div>
    <div class="km-float"><div class="glow-wrap"><div class="p-km"><svg viewBox="0 0 200 200" fill="none" stroke="rgba(200,205,215,.5)" stroke-width="1.5"><circle cx="100" cy="100" r="90"/><g transform="translate(100,100)"><polygon points="0,-55 25,-40 0,-25 -25,-40"/><polygon points="0,-30 45,0 0,30 -45,0" stroke-width="2"/><polygon points="0,25 25,40 0,55 -25,40"/></g><line x1="100" y1="88" x2="100" y2="112" stroke-width="1.2"/><line x1="88" y1="100" x2="112" y2="100" stroke-width="1.2"/></svg></div></div></div>
    <div class="p-t">赤澤一族</div><div class="p-gline"></div><div class="p-sub">清和源氏 — 令和版</div>
  </div>
  <div class="scue">↓</div>
</div>

<!-- 280px -->
<div class="hero sz-280" id="h3">
  <div class="layers"><div class="ly l1"></div><div class="ly l2"></div><div class="ly l3"></div><div class="ly l4"></div></div>
  <div class="ov ov-m"></div><div class="ov ov-g"></div>
  <div class="sz-label">280px</div>
  <div class="cc">
    <div class="p-en">AKAZAWA ICHIZOKU</div>
    <div class="km-float"><div class="glow-wrap"><div class="p-km"><svg viewBox="0 0 200 200" fill="none" stroke="rgba(200,205,215,.5)" stroke-width="1.5"><circle cx="100" cy="100" r="90"/><g transform="translate(100,100)"><polygon points="0,-55 25,-40 0,-25 -25,-40"/><polygon points="0,-30 45,0 0,30 -45,0" stroke-width="2"/><polygon points="0,25 25,40 0,55 -25,40"/></g><line x1="100" y1="88" x2="100" y2="112" stroke-width="1.2"/><line x1="88" y1="100" x2="112" y2="100" stroke-width="1.2"/></svg></div></div></div>
    <div class="p-t">赤澤一族</div><div class="p-gline"></div><div class="p-sub">清和源氏 — 令和版</div>
  </div>
  <div class="scue">↓</div>
</div>

<script>
function sw(n,btn){
  document.querySelectorAll('.hero').forEach(h=>h.classList.remove('on'));
  document.querySelectorAll('.sb').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('h'+n);
  el.style.display='none';el.offsetHeight;el.style.display='';
  el.classList.add('on');btn.classList.add('on');
}
</script>

</body>
</html>
